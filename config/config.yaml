# Configuration for DJ Transition Analysis System

analysis:
  # Song analysis settings
  song:
    sample_rate: 44100
    hop_length: 512
    n_fft: 2048
    n_mels: 128
    n_mfcc: 20
    
    # Feature extraction windows
    tempo_window_sec: 10
    tempo_hop_sec: 5
    energy_window_sec: 1.0
    spectral_window_sec: 0.5
    
    # Structure analysis
    structure_method: "scluster"  # Options: "scluster", "olda", "cnmf"
    
    # Vocal detection
    vocal_detection_threshold: 0.5
    
  # Transition detection settings
  transition:
    # Novelty detection
    novelty_pre_max: 10
    novelty_post_max: 10
    novelty_pre_avg: 10
    novelty_post_avg: 10
    novelty_delta: 0.1
    novelty_wait: 50
    
    # Minimum transition duration (seconds)
    min_transition_duration: 4.0
    max_transition_duration: 64.0
    
    # Source separation (for transition analysis)
    use_source_separation: true
    separation_model: "htdemucs"  # Options: "htdemucs", "mdx_extra"
    
  # Stem separation for smooth transitions (requires demucs)
  stem_separation:
    enabled: true
    model: "htdemucs"
    separate_stems: ["drums", "bass"]  # Which stems to separate and fade
    drums_fade_ratio: 0.25  # Fade out drums in first 25% of transition
    bass_fade_ratio: 0.5    # Fade out bass in first 50% of transition
  # Beat-aligned drum handoff: switch drums on downbeat with no overlap (prevents clash)
  drum_handoff:
    handoff_ratio: 0.25     # Approx when to switch (snapped to next downbeat)
    overlap_beats: 0.0      # 0 = hard cutover, 0.5 = 1-beat overlap
    fade_a_beats: 1.0       # Beats for A drums to fade out
    fade_b_beats: 1.0       # Beats for B drums to fade in
  
  # Phrase-aware, gentler stem fades (superhuman / stem orchestration)
  stem_fades:
    vocal_fade_duration_sec: 2.5   # Fade duration for vocal/other (phrase-aligned)
    fade_curve: "moderate"         # "moderate" (cosine) or "smooth"
    
  # Transition analysis settings
  transition_analysis:
    # Volume curve resolution
    volume_curve_window_ms: 100
    
    # EQ analysis frequency bands
    eq_bands:
      sub_bass: [20, 60]
      bass: [60, 250]
      low_mid: [250, 500]
      mid: [500, 2000]
      high_mid: [2000, 6000]
      high: [6000, 20000]
    
    # Technique detection thresholds
    bass_swap_threshold_db: -12
    filter_sweep_threshold_hz: 200
    echo_detection_rt60_threshold_ms: 500

database:
  path: "database/transitions.db"
  echo: false  # SQLAlchemy echo mode

storage:
  # Output directories
  songs_dir: "data/songs"
  mixes_dir: "data/mixes"
  transitions_dir: "data/transitions"
  
  # Compression
  compress_json: false  # Use gzip compression for JSON files

audio:
  # Default audio loading settings
  mono: true  # Convert to mono for analysis
  duration_limit: null  # None = analyze full file, or set seconds

fingerprinting:
  # Audio fingerprinting for track identification
  enabled: false  # Set to true if using fingerprinting service
  service: "acrcloud"  # Options: "acrcloud", "dejavu", "shazam"
  api_key: null  # Set in .env file

logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/analysis.log"

superhuman:
  vocal_bed_swap_enabled: true
  max_tempo_shift_pct: 0.06
  allow_simultaneous_vocals: "rare"
  # Mix at level: no volume dip; equal-power blend so neither track is "lowered"
  mix_at_level: true
  # BPM matching: always align tempo during overlap when BPM diff > threshold (not only when role_plan exists)
  bpm_matching_always: true
  bpm_matching_min_diff: 1.0  # Apply tempo morph when |tempo_a - tempo_b| > this (BPM)
  # Use selected technique (filter_sweep, drop_mix, etc.) this fraction of the time instead of stem crossfade (0–1)
  technique_execution_ratio: 0.62
  # Avoid repeating stem orchestration back-to-back when stems are available
  avoid_consecutive_stem_orchestration: true
  # Technique diversity memory for superhuman transitions
  technique_diversity_lookback: 4
  technique_diversity_attempts: 4
  # When true, always use stem orchestration (One Kiss beat → Hell of a Life beat handoff) instead of hybrid techniques
  force_stem_orchestration: false
  # Override stem conversation type: null = use recommended, or e.g. "bass_from_a_beat_from_b" (keep A bass, B beat)
  conversation_type: null
  # Key modulation: pitch-shift A/B so they match compatible key (A/B material only)
  key_modulation_enabled: true
  key_modulation_max_semitones: 2
  key_modulation_only_when_incompatible: true
  # ── Stem Morphing: progressively transform stem A audio into stem B ──
  # Instead of just fading volumes, the actual audio transforms note-by-note,
  # hit-by-hit, timbre-by-timbre into the next song's stems.
  stem_morphing_enabled: true
  stem_morph_depth: 0.56              # 0.0 = off, 1.0 = full content transformation
  stem_morph_strategy: "best_match"  # "best_match" | "drums_first" | "all" | specific stem name
  # Techniques list (null = auto-select per stem type):
  #   spectral_envelope  - timbre morphing (Phase 1)
  #   onset_replacement  - drum hit swapping (Phase 2, drums only)
  #   chroma_modulation  - note-by-note pitch convergence (Phase 3, pitched stems)
  #   cross_synthesis    - phase vocoder blend (Phase 4)
  #   multiband_crossfade - per-frequency-band content morph
  stem_morph_techniques: null

# Creative technique selection (optional; defaults in code used if not set)
creativity:
  technique_diversity: "top_k"  # "top_k" or "random_nudge"
  top_k: 3                      # Choose randomly among top N techniques by score
  random_nudge: 0.1             # If technique_diversity is "random_nudge", add ±nudge to scores
