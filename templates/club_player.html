<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Club AutoMixer</title>
<style>
  :root { --bg:#0b0c10; --panel:#15171f; --accent:#7c5cff; --accent2:#22d3ee; --txt:#e8e8ee; --mut:#8b8fa3; }
  * { box-sizing:border-box; }
  body { margin:0; background:radial-gradient(1200px 600px at 50% -10%, #1a1030, var(--bg)); color:var(--txt);
         font:15px/1.5 -apple-system,system-ui,Segoe UI,Roboto,sans-serif; min-height:100vh; }
  .wrap { max-width:760px; margin:0 auto; padding:40px 20px 80px; }
  h1 { font-size:26px; font-weight:700; letter-spacing:-.02em; margin:0 0 4px; }
  .sub { color:var(--mut); margin:0 0 28px; }
  .panel { background:var(--panel); border:1px solid #23262f; border-radius:16px; padding:20px; margin-bottom:18px; }
  label { display:block; font-size:13px; color:var(--mut); margin:0 0 6px; }
  input[type=text] { width:100%; padding:12px 14px; background:#0e0f15; border:1px solid #2a2d39; border-radius:10px;
                     color:var(--txt); font-size:14px; }
  .row { display:flex; gap:10px; align-items:center; margin-top:14px; flex-wrap:wrap; }
  button { background:linear-gradient(135deg,var(--accent),#5b3fe0); color:#fff; border:0; padding:12px 18px;
           border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; }
  button.ghost { background:#222533; }
  button:disabled { opacity:.5; cursor:default; }
  .bars { display:flex; align-items:center; gap:8px; color:var(--mut); font-size:13px; }
  .bars input[type=range] { width:120px; }
  #status { margin-top:14px; font-size:14px; color:var(--accent2); min-height:20px; }
  .pbar { height:8px; background:#0e0f15; border-radius:6px; overflow:hidden; margin-top:14px; border:1px solid #2a2d39; }
  .pbar > div { height:100%; width:0; background:linear-gradient(90deg,var(--accent2),var(--accent)); transition:width .2s; }
  .timeline { display:flex; height:34px; border-radius:8px; overflow:hidden; margin-top:14px; border:1px solid #2a2d39; }
  .seg { display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; white-space:nowrap; overflow:hidden; }
  .seg.track { background:#3a3f55; color:#cfd3e6; }
  .seg.transition { background:linear-gradient(135deg,var(--accent2),var(--accent)); color:#0b0c10; }
  .nowplaying { margin-top:10px; font-size:14px; } .nowplaying b { color:var(--accent2); }
  .legend { color:var(--mut); font-size:12px; margin-top:8px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎛️ Club AutoMixer</h1>
  <p class="sub">Paste a YouTube playlist — get one continuous, beat-matched, gapless club mix that starts instantly.</p>

  <div class="panel">
    <label>YouTube playlist (or single video) URL</label>
    <input id="url" type="text" placeholder="https://www.youtube.com/playlist?list=..."/>
    <div class="row">
      <div class="bars">Blend
        <input id="bars" type="range" min="8" max="32" step="8" value="16"/>
        <span id="barsval">16</span> bars</div>
      <label class="bars" style="margin:0"><input id="stems" type="checkbox" checked/> demucs stems</label>
      <button id="go">Mix &amp; Play</button>
      <button id="sample" class="ghost">Try sample</button>
      <button id="stop" class="ghost" style="display:none">Stop</button>
    </div>
    <div id="status"></div>
  </div>

  <div class="panel" id="player" style="display:none">
    <div class="pbar"><div id="fill"></div></div>
    <div class="nowplaying" id="now"></div>
    <div class="timeline" id="timeline"></div>
    <div class="legend">grey = track • gradient = beat-matched transition (hover for type)</div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
$("#bars").oninput = e => $("#barsval").textContent = e.target.value;

let ctx, gain, sid, gen = 0;
let nextIdx = 0, nextTime = 0, t0 = 0, started = false, tlLen = 0, statusInfo = {};
const PREBUFFER = 4;     // chunks (~16s) buffered before playback starts (prevents underrun)
const LOOKAHEAD = 12;    // seconds scheduled ahead of the playhead
const scheduled = new Set();  // chunk indices already scheduled (never twice)

function fail(m){ $("#status").textContent = "✗ " + m; resetButtons(); }
function resetButtons(){ $("#go").disabled=$("#sample").disabled=false; $("#stop").style.display="none"; }
function stopAll(){ gen++; if(ctx){ try{ctx.close();}catch(_){} ctx=null; } }   // gen++ kills any running loop
$("#stop").onclick = () => { stopAll(); $("#status").textContent="⏹ stopped"; resetButtons(); };

async function start(body) {
  stopAll();
  const myGen = ++gen;                         // unique generation for THIS run
  nextIdx = 0; nextTime = 0; t0 = 0; started = false; tlLen = 0; statusInfo = {};
  scheduled.clear();
  $("#player").style.display = "none";
  $("#timeline").innerHTML = ""; $("#now").innerHTML = "";
  $("#status").textContent = "starting…";
  $("#go").disabled = $("#sample").disabled = true; $("#stop").style.display = "inline-block";
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  gain = ctx.createGain(); gain.gain.value = 1.0; gain.connect(ctx.destination);
  try {
    const r = await fetch("/api/set/start", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
    const j = await r.json();
    if (j.error) throw new Error(j.error);
    sid = j.session_id;
    loop(myGen);
  } catch (e) { fail(e.message); }
}

async function fetchDecode(i){
  const r = await fetch(`/api/set/${sid}/chunk/${i}`);
  if (r.status !== 200) return null;            // not produced yet -> retry next tick
  try { return await ctx.decodeAudioData(await r.arrayBuffer()); } catch(_) { return null; }
}

async function loop(myGen){
  if (myGen !== gen) return;                     // stale run -> die (prevents double playback)
  try { statusInfo = await fetch("/api/set/"+sid).then(r=>r.json()); } catch(_){}
  if (myGen !== gen) return;
  if (statusInfo.status === "error") return fail(statusInfo.error || "render failed");

  const ready = statusInfo.chunks_ready || 0;
  const total = statusInfo.chunk_count;          // null until finished
  const chunkSec = statusInfo.chunk_sec || 4;

  // Start playback only after a healthy prebuffer (or once the whole set is done).
  if (!started && (ready >= PREBUFFER || (total != null && ready >= total))) {
    started = true;
    t0 = ctx.currentTime + 0.3;
    nextTime = t0;
    $("#player").style.display = "block";
  }

  if (started) {
    while (myGen === gen && nextIdx < ready && nextTime < ctx.currentTime + LOOKAHEAD) {
      if (scheduled.has(nextIdx)) { nextIdx++; continue; }   // belt-and-suspenders: never twice
      const buf = await fetchDecode(nextIdx);
      if (myGen !== gen) return;
      if (!buf) break;                            // chunk not ready -> retry same index next tick
      if (nextTime < ctx.currentTime) nextTime = ctx.currentTime + 0.05;  // underrun: small resync, no overlap
      const src = ctx.createBufferSource(); src.buffer = buf; src.connect(gain);
      src.start(nextTime);
      scheduled.add(nextIdx);
      nextTime += buf.duration;
      nextIdx++;
    }
  }

  // ---- UI (live markers) ----
  const markers = statusInfo.markers || [];
  if (markers.length !== tlLen) { buildTimeline(markers); tlLen = markers.length; }
  if (started) {
    const elapsed = Math.max(0, ctx.currentTime - t0);
    const denom = (total != null ? total*chunkSec : Math.max(elapsed, (markers.length?markers[markers.length-1].end_sec:1)));
    $("#fill").style.width = Math.min(100, 100*elapsed/Math.max(denom,1)) + "%";
    updateNow(elapsed, markers);
    $("#status").textContent = statusInfo.status === "ready"
      ? `▶ full set ready — ${statusInfo.n_tracks} tracks` : "▶ playing (rendering ahead…)";
  } else {
    $("#status").textContent = "⏳ " + (statusInfo.status||"working") + " — buffering " + ready + "/" + PREBUFFER;
  }

  const finished = total != null && nextIdx >= total;
  if (finished) { $("#status").textContent = "✓ set complete"; resetButtons(); return; }
  setTimeout(() => loop(myGen), 200);
}

function buildTimeline(markers){
  const tl = $("#timeline"); tl.innerHTML = "";
  if (!markers.length) return;
  const dur = markers[markers.length-1].end_sec || 1;
  markers.forEach(m => {
    const d = document.createElement("div");
    d.className = "seg " + m.type;
    d.style.width = Math.max(0.5,(m.end_sec-m.start_sec)/dur*100) + "%";
    d.title = m.type==="transition" ? `transition (${m.transition_type})` : `track ${m.index+1}`;
    d.textContent = m.type==="transition" ? "↔" : ("T"+(m.index+1));
    tl.appendChild(d);
  });
}
function updateNow(elapsed, markers){
  const m = markers.find(m => elapsed>=m.start_sec && elapsed<m.end_sec);
  if (m) $("#now").innerHTML = m.type==="transition"
      ? `🔀 <b>${m.transition_type} transition</b> — track ${m.from+1} → ${m.to+1}`
      : `▶️ <b>track ${m.index+1}</b>`;
  else if (markers.length) $("#now").innerHTML = `▶️ <b>track 1</b>`;
}

$("#go").onclick = () => {
  const url = $("#url").value.trim();
  if (!url) { $("#status").textContent = "enter a playlist URL (or Try sample)"; return; }
  start({url, blend_bars:+$("#bars").value, use_stems:$("#stems").checked});
};
$("#sample").onclick = () => start({files:["__SAMPLE__"], blend_bars:+$("#bars").value, use_stems:$("#stems").checked});
</script>
</body>
</html>
